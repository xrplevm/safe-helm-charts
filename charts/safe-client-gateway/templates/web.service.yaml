---
apiVersion: v1

kind: Service

metadata:
  name: {{ include "safe-client-gateway.fullname" . }}-web

spec:
  selector:
    app: {{ include "safe-client-gateway.fullname" . }}-web
  ports:
    - name: web
      protocol: TCP
      port: 80
      targetPort: {{ if .Values.cors.enabled }}8080{{ else }}3000{{ end }}
---