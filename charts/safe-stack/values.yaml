# Default values for safe-stack.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
#
# This values file is configured to match the docker-compose setup
# from safe-infrastructure/ as closely as possible.

## Provide a name in place of safe-stack for `app:` labels
##
nameOverride: ""
## Provide a name to substitute for the full names of resources
##
fullnameOverride: ""
## Reference to one or more secrets to be used when pulling images
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
##
imagePullSecrets: []

##
## ---------------------------------------------------------------------------
## GENERAL RABBITMQ (inter-service event bus)
## Docker Compose equivalent: general-rabbitmq
## Used by: txs-service (EVENTS_QUEUE_URL), events-service (AMQP_URL)
## ---------------------------------------------------------------------------
##
general-rabbitmq:
  enabled: true
  auth:
    username: guest
    password: guest
  persistence:
    enabled: true
    storageClass: "standard"
    size: 100Mi

##
## ---------------------------------------------------------------------------
## TXS-SERVICE CONFIGURATION
## Docker Compose equivalent: txs-web, txs-worker-*, txs-scheduler
## ---------------------------------------------------------------------------
##
safe-transaction-service:
  enabled: true
  replicaCount: 1
  image:
    repository: safeglobal/safe-transaction-service
    tag: latest
    pullPolicy: Always
  extraEnv: []
  config:
    debug: false
    # Includes 'processing' queue missing from original Helm chart
    # Docker Compose splits into 3 workers, Helm uses 1 (values-only fix)
    queues: "default,indexing,processing,contracts,tokens,notifications,webhooks"
    secretKey: "Very-secure-secret-string"
    csrf:
      trustedOrigins: "http://localhost:8000"
    node:
      url: "http://your-rpc-node:8545" # Set your RPC endpoint
      useGanacheNode: false
    database:
      runMigration: true
      url: # leave empty, uses bitnami postgresql subchart
    redis:
      url: # leave empty, uses bitnami redis subchart
    rabbitmq:
      url: # leave empty, uses bitnami rabbitmq subchart (for Celery)
    events:
      # Points to the general-rabbitmq (not the TXS-internal one)
      # Docker Compose: EVENTS_QUEUE_URL=amqp://guest:guest@general-rabbitmq:5672/
      queueUrl: "amqp://guest:guest@safe-stack-general-rabbitmq:5672/"
    admin:
      auth:
        enabled: true
        username: root
        password: root123
        email: root@example.com
  scheduler:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources:
      requests:
        memory: "100Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"
  indexer:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources:
      requests:
        memory: "300Mi"
        cpu: "50m"
      limits:
        memory: "600Mi"
        cpu: "100m"
  web:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources:
      requests:
        memory: "1000Mi"
        cpu: "500m"
      limits:
        memory: "2000Mi"
        cpu: "1000m"
  ingress:
    enabled: true
    ingressClassName: nginx
    host: txs-service.minikube.net
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "false"
    tls:
      enabled: false
      #host:
      #secretName:
  ganacheNode:
    enabled: false # Not used in docker-compose production setup
  # Docker Compose: txs-db (postgres:14-alpine)
  # Credentials: psql://postgres:postgres@txs-db:5432/postgres
  safe-transaction-service-postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          username: postgres
          password: postgres
          database: postgres
    primary:
      # Docker Compose: command: -c 'max_connections=250'
      extendedConfiguration: |
        max_connections = 250
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi
  # Docker Compose: txs-redis
  safe-transaction-service-redis:
    enabled: true
    auth:
      enabled: false
    master:
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi
    replica:
      replicaCount: 0
  # Docker Compose: txs-rabbitmq (Celery broker only)
  safe-transaction-service-rabbitmq:
    enabled: true
    auth:
      username: guest
      password: guest
    persistence:
      enabled: true
      storageClass: "standard"
      size: 100Mi

##
## ---------------------------------------------------------------------------
## CFG-SERVICE CONFIGURATION
## Docker Compose equivalent: cfg-web
## ---------------------------------------------------------------------------
##
safe-config-service:
  enabled: true
  replicaCount: 1
  image:
    repository: safeglobal/safe-config-service
    tag: latest
    pullPolicy: Always
  extraEnv: []
  config:
    debug: true
    secretKey: "very_strong_key_you_should_change"
    mediaUrl: # leave empty to auto-generate from ingress host
    csrf:
      trustedOrigins: "http://localhost:8000"
    clientGateway:
      url: "http://safe-stack-safe-client-gateway-web"
      # Docker Compose uses CGW_AUTH_TOKEN (template updated from CGW_FLUSH_TOKEN)
      token: "1234567890"
    database:
      runMigration: true
      host: # leave empty if postgresql.enabled=true
      port: # leave empty if postgresql.enabled=true
      password: # leave empty if postgresql.enabled=true
      user: # leave empty if postgresql.enabled=true
      db: # leave empty if postgresql.enabled=true
    admin:
      auth:
        enabled: true
        username: root
        password: root123
        email: root@example.com
  web:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources: {}
  ingress:
    enabled: true
    ingressClassName: nginx
    host: cfg-service.minikube.net
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "false"
    tls:
      enabled: false
      #host:
      #secretName:
  # Docker Compose: cfg-db (postgres:14-alpine, default postgres/postgres/postgres)
  safe-config-service-postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          username: postgres
          password: postgres
          database: postgres
    primary:
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi

##
## ---------------------------------------------------------------------------
## CGW-SERVICE CONFIGURATION
## Docker Compose equivalent: cgw-web
## ---------------------------------------------------------------------------
##
safe-client-gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: safeglobal/safe-client-gateway-nest
    tag: latest
    pullPolicy: Always
  extraEnv: []
  config:
    debug: false
    cfgService:
      url: "http://safe-stack-safe-config-service-web"
    security:
      authToken: "1234567890"
    redis:
      host: # leave empty, uses bitnami redis subchart
      port: 6379
    database:
      host: # leave empty, uses bitnami postgresql subchart
      name: "postgres"
  # All env vars from cgw.env missing from the Helm configmap template
  extraEnvVars:
    # CORS (app-level, compose sets ALLOW_CORS=true)
    ALLOW_CORS: "true"
    # Staking (Kiln provider)
    STAKING_API_KEY: ""
    STAKING_TESTNET_API_KEY: ""
    # Bridge (LI.FI)
    BRIDGE_API_KEY: ""
    # JWT
    JWT_ISSUER: ""
    JWT_SECRET: ""
    # Community
    FINGERPRINT_ENCRYPTION_KEY: ""
    # CSV Export / AWS
    CSV_AWS_ACCESS_KEY_ID: "dummy"
    CSV_AWS_SECRET_ACCESS_KEY: "dummy"
    AWS_ACCESS_KEY_ID: "dummy"
    AWS_SECRET_ACCESS_KEY: "dummy"
    # Blocklist
    BLOCKLIST_ENCRYPTED_DATA: ""
    BLOCKLIST_SECRET_KEY: ""
    BLOCKLIST_SECRET_SALT: ""
    # Relay provider API keys (9 chains missing from Helm, present in Docker Compose)
    RELAY_PROVIDER_API_KEY_OPTIMISM: ""
    RELAY_PROVIDER_API_KEY_BSC: ""
    RELAY_PROVIDER_API_KEY_POLYGON: ""
    RELAY_PROVIDER_API_KEY_POLYGON_ZKEVM: ""
    RELAY_PROVIDER_API_KEY_BASE: ""
    RELAY_PROVIDER_API_KEY_AVALANCHE: ""
    RELAY_PROVIDER_API_KEY_LINEA: ""
    RELAY_PROVIDER_API_KEY_BLAST: ""
    RELAY_PROVIDER_API_KEY_UNICHAIN: ""
    # Push Notifications
    PUSH_NOTIFICATIONS_API_BASE_URI: "https://fcm.googleapis.com/v1/projects"
  web:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources:
      requests:
        memory: "300Mi"
        cpu: "300m"
      limits:
        memory: "600Mi"
        cpu: "600m"
  ingress:
    enabled: true
    ingressClassName: nginx
    host: cgw-service.minikube.net
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: "OPTIONS, GET, HEAD, DELETE, PUT, POST"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.minikube.net"
      nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Safe-Wallet-Signature,Safe-Wallet-Signature-Timestamp"
    tls:
      enabled: false
      #host:
      #secretName:
  # Docker Compose: cgw-redis
  safe-client-gateway-redis:
    enabled: true
    auth:
      enabled: false
    master:
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi
    replica:
      replicaCount: 0
  # Docker Compose: cgw-db (postgres:14-alpine) - NEW, was missing from original Helm
  safe-client-gateway-postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          username: postgres
          password: postgres
          database: postgres
    primary:
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi

##
## ---------------------------------------------------------------------------
## SAFE-WALLET CONFIGURATION
## Docker Compose equivalent: ui
## ---------------------------------------------------------------------------
##
safe-wallet-web:
  enabled: true
  replicaCount: 1
  image:
    # Official image (was gjeanmart/safe-wallet-web:force_safe_deployment)
    repository: safeglobal/safe-wallet-web
    tag: latest
    pullPolicy: Always
  extraEnv: []
  config:
    # Updated from 1.3.0 to 1.4.1 to match Docker Compose
    safeVersion: "1.4.1"
    clientGateway:
      url: "https://cgw-service.minikube.net"
    walletConnect:
      projectId: ""
      bridge: ""
  # Extra env vars from ui.env not in the configmap template
  extraEnvVars:
    NEXT_PUBLIC_DEFAULT_MAINNET_CHAIN_ID: ""
  ingress:
    enabled: true
    ingressClassName: nginx
    host: safe-wallet.minikube.net
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "false"
    tls:
      enabled: false
      #host:
      #secretName:

##
## ---------------------------------------------------------------------------
## EVENTS-SERVICE CONFIGURATION (NEW)
## Docker Compose equivalent: events-web
## ---------------------------------------------------------------------------
##
safe-events-service:
  enabled: true
  replicaCount: 1
  image:
    repository: safeglobal/safe-events-service
    tag: latest
    pullPolicy: Always
  extraEnv: []
  config:
    database:
      url: # leave empty, uses bitnami postgresql subchart
    amqp:
      # Points to the general-rabbitmq (shared event bus)
      # Docker Compose: AMQP_URL=amqp://general-rabbitmq:5672
      url: "amqp://guest:guest@safe-stack-general-rabbitmq:5672/"
      exchange: "safe-transaction-service-events"
      queue: "safe-events-service"
    admin:
      email: "admin@safe"
      password: "password"
    webhooksCacheTtl: "300000"
    nodeEnv: "production"
    urlBasePath: "/events"
  web:
    nodeSelector: {}
    affinity: {}
    tolerations: {}
    securityContext: {}
    podSecurityContext: {}
    resources: {}
  ingress:
    enabled: true
    ingressClassName: nginx
    host: events-service.minikube.net
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "false"
    tls:
      enabled: false
      #host:
      #secretName:
  # Docker Compose: events-db (postgres:14-alpine)
  # Credentials: psql://postgres:postgres@events-db:5432/postgres
  safe-events-service-postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          username: postgres
          password: postgres
          database: postgres
    primary:
      persistence:
        enabled: true
        storageClass: "standard"
        size: 100Mi
