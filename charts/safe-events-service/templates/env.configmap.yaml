{{ $pg_user := index .Values "safe-events-service-postgresql" "global" "postgresql" "auth" "username" }}
{{ $pg_password := index .Values "safe-events-service-postgresql" "global" "postgresql" "auth" "password" }}
{{ $pg_dbname := index .Values "safe-events-service-postgresql" "global" "postgresql" "auth" "database" }}
{{ $pg_db_port := 5432 }}

---
apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ include "safe-events-service.fullname" . }}-env

data:
  ## Database configuration
  {{- if index .Values "safe-events-service-postgresql" "enabled" }}
  DATABASE_URL: psql://{{ $pg_user }}:{{ $pg_password }}@{{ include "safe-events-service.postgresql.fullname" . }}:{{ $pg_db_port }}/{{ $pg_dbname }}
  {{ else }}
  DATABASE_URL: {{ .Values.config.database.url }}
  {{- end }}

  ## AMQP configuration
  AMQP_URL: {{ .Values.config.amqp.url }}
  AMQP_EXCHANGE: {{ .Values.config.amqp.exchange }}
  AMQP_QUEUE: {{ .Values.config.amqp.queue }}

  ## Admin
  ADMIN_EMAIL: {{ .Values.config.admin.email }}
  ADMIN_PASSWORD: {{ .Values.config.admin.password }}

  ## App config
  WEBHOOKS_CACHE_TTL: "{{ .Values.config.webhooksCacheTtl }}"
  NODE_ENV: {{ .Values.config.nodeEnv }}
  URL_BASE_PATH: {{ .Values.config.urlBasePath }}

  ## Extra envs
  {{- if .Values.extraEnvVars }}
  {{ .Values.extraEnvVars | toYaml | nindent 2 }}
  {{- end }}
---
